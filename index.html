<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Loane Pro</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Loane Pro">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0E5A34">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- Écran de lancement -->
<div id="splash">
  <img src="icons/logo.png" alt="Loane Pro" class="splash-logo">
  <div class="splash-name">Loane Pro</div>
  <div class="splash-bar"><i></i></div>
  <div class="splash-version" id="splash-version"></div>
</div>

<!-- Écran de verrouillage -->
<div id="lock" hidden>
  <img src="icons/logo.png" alt="" class="lock-logo">
  <div class="lock-title">Code d'accès</div>
  <div class="lock-dots" id="lock-dots"></div>
  <div class="lock-msg" id="lock-msg"></div>
  <div class="keypad" id="keypad">
    <button>1</button><button>2</button><button>3</button>
    <button>4</button><button>5</button><button>6</button>
    <button>7</button><button>8</button><button>9</button>
    <span></span><button>0</button><button data-del>⌫</button>
  </div>
</div>

<header class="topbar">
  <h1 id="page-title">Agenda</h1>
  <button id="topbar-action" class="btn-icon" hidden>＋</button>
</header>

<main id="view"></main>

<nav class="tabbar">
  <button class="tab active" data-tab="agenda"><span class="tab-ico">📅</span>Agenda</button>
  <button class="tab" data-tab="students"><span class="tab-ico">🎤</span>Élèves</button>
  <button class="tab" data-tab="hours"><span class="tab-ico">⏱️</span>Heures</button>
  <button class="tab" data-tab="billing"><span class="tab-ico">🧾</span>Factures</button>
  <button class="tab" data-tab="library"><span class="tab-ico">🎼</span>Chants</button>
  <button class="tab" data-tab="settings"><span class="tab-ico">⚙️</span>Réglages</button>
</nav>

<div id="sheet-backdrop" hidden></div>
<div id="sheet" class="sheet" hidden></div>
<div id="toast" hidden></div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
